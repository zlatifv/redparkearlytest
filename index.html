<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Red Park - Multiplayer 3D World</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .ui-panel {
            position: absolute;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            color: white;
            border-radius: 12px;
            padding: 12px 20px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 10;
            pointer-events: auto;
            font-size: 14px;
        }
        .top-left { top: 20px; left: 20px; display: flex; gap: 12px; }
        .top-right { top: 20px; right: 20px; display: flex; gap: 12px; }
        .bottom-center {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 40px;
        }
        button {
            background: #ff4757;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            font-size: 14px;
        }
        button.secondary { background: #2c3e66; }
        button.admin { background: #d63031; }
        button:hover { transform: scale(1.02); filter: brightness(1.1); }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #1e272e;
            border-radius: 24px;
            padding: 30px;
            width: 320px;
            color: white;
            border: 1px solid #ff4757;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #2f3e46;
            color: white;
        }
        .friend-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .friend-item {
            background: #2c3e50;
            margin: 5px 0;
            padding: 5px 10px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
        }
        .info-text {
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
        }
        .admin-panel {
            position: absolute;
            top: 80px;
            right: 20px;
            width: 260px;
            background: #1e272e;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid gold;
            display: none;
            z-index: 200;
        }
        .admin-panel.show { display: block; }
        @media (max-width: 600px) {
            button { padding: 6px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="ui-panel top-left">
        <button id="menuBtn">☰ Menu</button>
        <button id="homeBtn">🏠 Home</button>
    </div>
    <div class="ui-panel top-right">
        <button id="friendsBtn">👥 Friends</button>
        <button id="settingsBtn">⚙️ Settings</button>
        <div id="adminIndicator" style="display:none; background:#d63031; border-radius:20px; padding:0 8px; line-height:32px;">👑 ADMIN</div>
    </div>
    <div class="ui-panel bottom-center">
        <span id="playerCount">Players: 0</span>
        <span>|</span>
        <span id="currentUserDisplay">Guest</span>
    </div>
    <div class="info-text">🕹️ WASD Move | Mouse Look | Click to focus</div>

    <div id="authModal" class="modal" style="display:flex;">
        <div class="modal-content">
            <h2>🏞️ Red Park</h2>
            <p>Sign up / Log in</p>
            <input type="text" id="usernameInput" placeholder="Username">
            <input type="password" id="passwordInput" placeholder="Password">
            <button id="signupBtn">Sign Up</button>
            <button id="loginBtn" style="background:#2c3e66;">Log In</button>
            <p style="font-size:12px; margin-top:12px;">Admin: zlati (any password)</p>
        </div>
    </div>

    <div id="menuModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Menu</h3>
            <button id="joinFriendBtn">Join Friend's World</button>
            <button id="changeSettingsBtn">Settings</button>
            <button id="closeMenuBtn">Close</button>
        </div>
    </div>

    <div id="friendsModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Friends</h3>
            <input type="text" id="addFriendInput" placeholder="Username to add">
            <button id="addFriendConfirmBtn">Add Friend</button>
            <div id="friendsListContainer" class="friend-list"></div>
            <button id="closeFriendsBtn">Close</button>
        </div>
    </div>

    <div id="settingsModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Settings</h3>
            <label>🌓 Graphics Quality</label>
            <select id="gfxSelect">
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
            <button id="closeSettingsBtn">Save & Close</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-panel">
        <h4>Admin Panel (zlati)</h4>
        <button id="adminKickAllBtn">Kick All Non-Admin</button>
        <button id="adminSetWeatherBtn">Rainbow Weather</button>
        <button id="adminBroadcastBtn">Broadcast MSG</button>
        <button id="adminCloseBtn">Close</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        let currentUser = null;
        let isAdmin = false;
        let players = {};
        let localPlayerMesh;
        let localPlayerLabel;
        let scene, camera, renderer, labelRenderer, controls;
        let keys = { w: false, s: false, a: false, d: false };
        let clock = new THREE.Clock();
        let moveSpeed = 5;
        let socketChannel;
        let playerId = Math.random().toString(36).substring(2, 8);
        let otherPlayers = new Map();
        let friendsList = [];

        function saveFriends() {
            if(currentUser) localStorage.setItem(`friends_${currentUser}`, JSON.stringify(friendsList));
        }
        
        function loadFriends() {
            if(currentUser) {
                let raw = localStorage.getItem(`friends_${currentUser}`);
                friendsList = raw ? JSON.parse(raw) : [];
                renderFriendsList();
            }
        }
        
        function renderFriendsList() {
            const container = document.getElementById('friendsListContainer');
            if(!container) return;
            if(friendsList.length === 0) {
                container.innerHTML = '<p>No friends yet. Add some!</p>';
                return;
            }
            container.innerHTML = friendsList.map(f => `<div class="friend-item">${f} <button class="joinFriendItemBtn" data-name="${f}">Join</button></div>`).join('');
            document.querySelectorAll('.joinFriendItemBtn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const friendName = btn.getAttribute('data-name');
                    joinFriendWorld(friendName);
                });
            });
        }
        
        function joinFriendWorld(friendName) {
            alert(`Joining ${friendName}'s session...`);
            initMultiplayerChannel(`room_${friendName}`);
        }
        
        function initMultiplayerChannel(roomId = 'redpark_global') {
            if(socketChannel) socketChannel.close();
            socketChannel = new BroadcastChannel(roomId);
            socketChannel.onmessage = (event) => {
                const data = event.data;
                if(data.type === 'playerUpdate' && data.id !== playerId) {
                    updateOtherPlayer(data.id, data.position, data.name, data.color);
                }
                if(data.type === 'playerLeave') removeOtherPlayer(data.id);
                if(data.type === 'adminBroadcast' && !isAdmin) alert(`📢 Admin: ${data.message}`);
                if(data.type === 'kickNonAdmins' && !isAdmin && currentUser !== 'zlati') {
                    alert("You were kicked by admin!");
                }
            };
            setTimeout(() => broadcastMyState(), 500);
        }
        
        function broadcastMyState() {
            if(!localPlayerMesh) return;
            socketChannel?.postMessage({
                type: 'playerUpdate',
                id: playerId,
                name: currentUser,
                position: { x: localPlayerMesh.position.x, y: localPlayerMesh.position.y, z: localPlayerMesh.position.z },
                color: isAdmin ? 0xffaa44 : 0x66ccff
            });
        }
        
        function updateOtherPlayer(id, pos, name, colorHex) {
            let obj = otherPlayers.get(id);
            if(!obj) {
                const geometry = new THREE.BoxGeometry(0.8, 1.2, 0.8);
                const material = new THREE.MeshStandardMaterial({ color: colorHex || 0x66ccff });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.castShadow = true;
                scene.add(mesh);
                const div = document.createElement('div');
                div.textContent = name;
                div.style.cssText = 'color:white;background:rgba(0,0,0,0.6);padding:2px 6px;border-radius:12px;font-size:12px';
                const label = new CSS2DObject(div);
                scene.add(label);
                obj = { mesh, label, name };
                otherPlayers.set(id, obj);
            }
            obj.mesh.position.set(pos.x, pos.y, pos.z);
            obj.label.position.set(pos.x, pos.y + 1.2, pos.z);
        }
        
        function removeOtherPlayer(id) {
            const obj = otherPlayers.get(id);
            if(obj) {
                scene.remove(obj.mesh);
                scene.remove(obj.label);
                otherPlayers.delete(id);
            }
        }
        
        function sendLeaveSignal() {
            socketChannel?.postMessage({ type: 'playerLeave', id: playerId });
        }
        
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 50, 100);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.left = '0px';
            document.body.appendChild(labelRenderer.domElement);
            
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(10, 20, 5);
            dirLight.castShadow = true;
            scene.add(dirLight);
            
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), new THREE.MeshStandardMaterial({ color: 0x5c9e5e, roughness: 0.8 }));
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Red Residences (The home building)
            const buildingMat = new THREE.MeshStandardMaterial({ color: 0xaa3e3e });
            const mainBlock = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), buildingMat);
            mainBlock.position.set(12, 0.5, 8);
            scene.add(mainBlock);
            const roof = new THREE.Mesh(new THREE.ConeGeometry(2.2, 1.5, 4), new THREE.MeshStandardMaterial({ color: 0x8b3a3a }));
            roof.position.set(12, 2.2, 8);
            scene.add(roof);
            
            const signDiv = document.createElement('div');
            signDiv.textContent = '🏠 Red Residences';
            signDiv.style.cssText = 'background:#3a1e1e;padding:4px 10px;border-radius:8px;font-weight:bold;color:white';
            const signLabel = new CSS2DObject(signDiv);
            signLabel.position.set(12, 2.2, 8.5);
            scene.add(signLabel);
            
            // Trees
            for(let i = 0; i < 40; i++) {
                const angle = Math.random() * Math.PI * 2;
                const rad = 15 + Math.random() * 25;
                const treeGroup = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 1.2), new THREE.MeshStandardMaterial({ color: 0x8B5A2B }));
                const foliage = new THREE.Mesh(new THREE.ConeGeometry(0.9, 1.2, 8), new THREE.MeshStandardMaterial({ color: 0x4caf50 }));
                foliage.position.y = 1;
                treeGroup.add(trunk, foliage);
                treeGroup.position.set(Math.cos(angle) * rad, -0.2, Math.sin(angle) * rad);
                scene.add(treeGroup);
            }
            
            localPlayerMesh = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.2, 0.7), new THREE.MeshStandardMaterial({ color: 0x44aaee }));
            localPlayerMesh.castShadow = true;
            scene.add(localPlayerMesh);
            const nameDiv = document.createElement('div');
            nameDiv.textContent = currentUser;
            nameDiv.style.cssText = 'background:black;color:white;padding:2px 8px;border-radius:16px';
            localPlayerLabel = new CSS2DObject(nameDiv);
            scene.add(localPlayerLabel);
            localPlayerMesh.position.set(12, -0.2, 9);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(12, 1, 9);
            
            window.addEventListener('keydown', (e) => { if(['w','s','a','d'].includes(e.key)) keys[e.key] = true; });
            window.addEventListener('keyup', (e) => { if(['w','s','a','d'].includes(e.key)) keys[e.key] = false; });
            
            function animate() {
                requestAnimationFrame(animate);
                if(localPlayerMesh) {
                    let move = new THREE.Vector3(0,0,0);
                    if(keys.w) move.z -= 1;
                    if(keys.s) move.z += 1;
                    if(keys.a) move.x -= 1;
                    if(keys.d) move.x += 1;
                    move.normalize();
                    let newPos = localPlayerMesh.position.clone().add(move.multiplyScalar(moveSpeed * 0.016));
                    newPos.x = Math.max(-35, Math.min(35, newPos.x));
                    newPos.z = Math.max(-35, Math.min(35, newPos.z));
                    localPlayerMesh.position.copy(newPos);
                    localPlayerLabel.position.copy(localPlayerMesh.position);
                    localPlayerLabel.position.y += 1.2;
                    camera.position.lerp(new THREE.Vector3(localPlayerMesh.position.x, localPlayerMesh.position.y + 2, localPlayerMesh.position.z + 5), 0.1);
                    controls.target.copy(localPlayerMesh.position);
                    controls.update();
                    broadcastMyState();
                }
                renderer.render(scene, camera);
                labelRenderer.render(scene, camera);
            }
            animate();
        }
        
        function handleAuth() {
            document.getElementById('signupBtn').onclick = () => {
                const user = document.getElementById('usernameInput').value.trim();
                const pwd = document.getElementById('passwordInput').value;
                if(!user) return alert("Enter username");
                let users = JSON.parse(localStorage.getItem('users') || '{}');
                if(users[user]) return alert("User exists");
                users[user] = { password: pwd };
                localStorage.setItem('users', JSON.stringify(users));
                completeLogin(user);
            };
            document.getElementById('loginBtn').onclick = () => {
                const user = document.getElementById('usernameInput').value.trim();
                const pwd = document.getElementById('passwordInput').value;
                if(user === 'zlati') return completeLogin('zlati');
                let users = JSON.parse(localStorage.getItem('users') || '{}');
                if(users[user] && users[user].password === pwd) completeLogin(user);
                else alert("Invalid credentials");
            };
        }
        
        function completeLogin(username) {
            currentUser = username;
            isAdmin = (username === 'zlati');
            localStorage.setItem('currentUser', username);
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('currentUserDisplay').innerText = username;
            if(isAdmin) {
                document.getElementById('adminIndicator').style.display = 'block';
                const adminBtn = document.createElement('button');
                adminBtn.innerText = '🛠️ Admin';
                adminBtn.onclick = () => document.getElementById('adminPanel').classList.toggle('show');
                document.querySelector('.top-right').appendChild(adminBtn);
            }
            loadFriends();
            init3D();
            initMultiplayerChannel();
            
            document.getElementById('homeBtn').onclick = () => { if(localPlayerMesh) localPlayerMesh.position.set(12, -0.2, 9); };
            document.getElementById('menuBtn').onclick = () => document.getElementById('menuModal').style.display = 'flex';
            document.getElementById('closeMenuBtn').onclick = () => document.getElementById('menuModal').style.display = 'none';
            document.getElementById('friendsBtn').onclick = () => { document.getElementById('friendsModal').style.display = 'flex'; renderFriendsList(); };
            document.getElementById('closeFriendsBtn').onclick = () => document.getElementById('friendsModal').style.display = 'none';
            document.getElementById('addFriendConfirmBtn').onclick = () => {
                const friendName = document.getElementById('addFriendInput').value.trim();
                if(friendName && friendName !== currentUser && !friendsList.includes(friendName)) {
                    friendsList.push(friendName);
                    saveFriends();
                    renderFriendsList();
                    document.getElementById('addFriendInput').value = '';
                }
            };
            document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsModal').style.display = 'flex';
            document.getElementById('closeSettingsBtn').onclick = () => document.getElementById('settingsModal').style.display = 'none';
            document.getElementById('joinFriendBtn').onclick = () => {
                const target = prompt("Enter friend's username:");
                if(target) joinFriendWorld(target);
                document.getElementById('menuModal').style.display = 'none';
            };
            
            document.getElementById('adminKickAllBtn').onclick = () => socketChannel?.postMessage({ type: 'kickNonAdmins' });
            document.getElementById('adminSetWeatherBtn').onclick = () => { scene.background.setHex(0xffaa88); setTimeout(() => scene.background.setHex(0x87CEEB), 5000); };
            document.getElementById('adminBroadcastBtn').onclick = () => {
                const msg = prompt("Broadcast message:");
                if(msg) socketChannel?.postMessage({ type: 'adminBroadcast', message: msg });
            };
            document.getElementById('adminCloseBtn').onclick = () => document.getElementById('adminPanel').classList.remove('show');
        }
        
        setInterval(() => {
            document.getElementById('playerCount').innerText = `Players: ${otherPlayers.size + 1}`;
        }, 1000);
        
        window.addEventListener('beforeunload', () => sendLeaveSignal());
        
        const savedUser = localStorage.getItem('currentUser');
        if(savedUser && savedUser !== 'null') {
            completeLogin(savedUser);
        } else {
            handleAuth();
        }
    </script>
</body>
</html>
